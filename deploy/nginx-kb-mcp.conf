# /etc/nginx/sites-available/kb-mcp.keyflo.ai
# Proxy to kb-gateway MCP (streamable-http) on localhost:8790

server {
    listen 80;
    listen [::]:80;
    server_name kb-mcp.keyflo.ai;

    location /mcp {
        proxy_pass http://127.0.0.1:8790/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8790;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 1m;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kb-mcp.keyflo.ai;

    ssl_certificate     /etc/ssl/cloudflare/keyflo.ai.pem;
    ssl_certificate_key /etc/ssl/cloudflare/keyflo.ai.key;

    location /mcp {
        proxy_pass http://127.0.0.1:8790/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8790;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 1m;
    }

    location / {
        return 404;
    }
}
